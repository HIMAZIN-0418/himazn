<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>ただの中学生</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      .lang-switch {
        position: relative;
        display: flex;
        width: 220px;
        margin: 20px auto;
        background: #333;
        border-radius: 30px;
        overflow: hidden;
      }
      .lang-switch button {
        flex: 1;
        padding: 10px;
        border: none;
        bockground: none;
        cursor: pointer;
        z-index: 1;
        font-weight: bold;
      }
      .slider {
        position: absolute;
        width: 33.3%;
        height: 100%;
        background: #37baba;
        bordgr-radius: 30px;
        transition: 0.3s;
        left: 0;
      }
    </style>
  </head>
  
<body>
  <div class="lang-switch">
    <button onclick="setLang('ja')">日本語</button>
    <button onclick="setLang('en')">英語</button>
    <button onclick="setLang('zh')">中国語</button>
    <div class="slider"></div>
  </div>

  <h1 data-ja="電気工事士持ち"
      data-en="Licensed electrician"
      data-zh="持照电工">
  </h1>

  <p data-ja="資格持ちです！"
      data-en="I am qualified!"
      data-zh="我有资格！">
  </p>

  <script>
    function setLang(lang) {
      const elements = document.querySelectorAll("[data-ja]");

      elements.forEach(el => {
        el.textContent = el.getAttribute("data-"+lang);
      });

      const slider = document.querySelector(".slider");
      if (lang === "ja") slider.style.left = "0%" ;
      if (lang === "en") slider.style.left = "33.3%" ;
      if (lang === "zh") slider.style.left = "66.6%" ;

    }
    setLang("ja");
  </script>

</body>
</html>
